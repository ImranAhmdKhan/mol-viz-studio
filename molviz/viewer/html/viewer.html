<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>MolViz Viewer</title>
  <!-- Qt WebChannel support — must load before the inline script below -->
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #1a1a2e; overflow: hidden; }
    #viewer-container { width: 100%; height: 100%; position: relative; }
    #loading-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(26,26,46,0.92); display: flex;
      align-items: center; justify-content: center;
      color: #a0c4ff; font-family: monospace; font-size: 1.1em;
      z-index: 100;
    }
    #status-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.6); color: #ccc;
      font-family: monospace; font-size: 11px; padding: 3px 8px;
      z-index: 50; pointer-events: none;
    }
    #coord-display {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,0.55); color: #7dd3fc;
      font-family: monospace; font-size: 11px; padding: 4px 8px;
      border-radius: 4px; z-index: 50; pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="viewer-container">
    <div id="loading-overlay">Loading 3Dmol.js…</div>
    <div id="coord-display"></div>
    <div id="status-bar">Ready</div>
  </div>

  <!-- 3Dmol.js — loaded from CDN; falls back gracefully if offline -->
  <script>
    // -----------------------------------------------------------------
    // Globals
    // -----------------------------------------------------------------
    var viewer = null;
    var currentStyle = "cartoon";
    var currentColorScheme = "chainHetatm";
    var measureMode = null;      // null | "distance" | "angle" | "dihedral"
    var pickedAtoms = [];
    var measureResults = [];
    var annotations = [];

    // -----------------------------------------------------------------
    // Qt WebChannel bridge (populated once qt.webChannelTransport is ready)
    // -----------------------------------------------------------------
    var bridge = null;
    if (typeof QWebChannel !== "undefined") {
      new QWebChannel(qt.webChannelTransport, function(channel) {
        bridge = channel.objects.bridge;
      });
    }

    function notifyPython(event, data) {
      if (bridge && bridge.onViewerEvent) {
        bridge.onViewerEvent(event, JSON.stringify(data));
      }
    }

    // -----------------------------------------------------------------
    // Helpers
    // -----------------------------------------------------------------
    function setStatus(msg) {
      document.getElementById("status-bar").textContent = msg;
    }

    function setCoords(x, y, z) {
      var el = document.getElementById("coord-display");
      if (x === null) { el.textContent = ""; return; }
      el.textContent = "(" + x.toFixed(2) + ", " + y.toFixed(2) + ", " + z.toFixed(2) + ") Å";
    }

    // -----------------------------------------------------------------
    // 3Dmol.js initialisation (deferred until script loads)
    // -----------------------------------------------------------------
    function initViewer() {
      var container = document.getElementById("viewer-container");
      viewer = $3Dmol.createViewer(container, {
        backgroundColor: "0x1a1a2e",
        antialias: true,
        id: "mol-canvas"
      });
      viewer.setBackgroundColor("0x1a1a2e");
      document.getElementById("loading-overlay").style.display = "none";
      setStatus("Viewer ready — open a file to begin");

      // Atom hover
      viewer.setHoverable({}, true,
        function(atom, v, event, container) {
          if (!atom) return;
          var coord = "(" + atom.x.toFixed(2) + ", " + atom.y.toFixed(2) + ", " + atom.z.toFixed(2) + ")";
          setStatus("Atom: " + atom.atom + "  Residue: " + atom.resn + atom.resi +
                    "  Chain: " + atom.chain + "  Elem: " + atom.elem + "  " + coord);
          setCoords(atom.x, atom.y, atom.z);
        },
        function(atom, v, event, container) {
          setCoords(null);
        }
      );

      // Atom click — used for measurements
      viewer.setClickable({}, true, function(atom, v, event) {
        handleAtomClick(atom);
      });

      notifyPython("ready", {});
    }

    // -----------------------------------------------------------------
    // Load structure
    // -----------------------------------------------------------------
    function loadStructure(pdbStr, format) {
      if (!viewer) return;
      viewer.clear();
      annotations = [];
      pickedAtoms = [];
      measureResults = [];
      viewer.addModel(pdbStr, format || "pdb");
      applyStyle(currentStyle, currentColorScheme);
      viewer.zoomTo();
      viewer.render();
      setStatus("Structure loaded");
      notifyPython("structureLoaded", {});
    }

    // -----------------------------------------------------------------
    // Style / colour
    // -----------------------------------------------------------------
    function applyStyle(style, colorScheme) {
      if (!viewer) return;
      currentStyle = style;
      currentColorScheme = colorScheme;
      viewer.setStyle({}, {});

      var colorOpts = {};
      if (colorScheme === "chainHetatm") {
        colorOpts = {colorscheme: "chainHetatm"};
      } else if (colorScheme === "element") {
        colorOpts = {colorscheme: "Jmol"};
      } else if (colorScheme === "bfactor") {
        colorOpts = {colorscheme: {gradient: "roygb", min: 0, max: 100, prop: "b"}};
      } else if (colorScheme === "residue") {
        colorOpts = {colorscheme: "amino"};
      } else {
        colorOpts = {color: colorScheme};
      }

      var styleOpts = Object.assign({}, colorOpts);

      if (style === "cartoon") {
        viewer.setStyle({}, {cartoon: styleOpts});
      } else if (style === "stick") {
        viewer.setStyle({}, {stick: styleOpts});
      } else if (style === "sphere") {
        viewer.setStyle({}, {sphere: styleOpts});
      } else if (style === "line") {
        viewer.setStyle({}, {line: styleOpts});
      } else if (style === "surface") {
        viewer.setStyle({}, {cartoon: styleOpts});
        viewer.addSurface($3Dmol.SurfaceType.VDW, {
          opacity: 0.7, colorscheme: "whiteCarbon"
        });
      } else if (style === "ballstick") {
        viewer.setStyle({}, {
          stick: Object.assign({radius: 0.2}, colorOpts),
          sphere: Object.assign({radius: 0.35}, colorOpts)
        });
      }
      viewer.render();
    }

    function setBackground(hexColor) {
      if (!viewer) return;
      viewer.setBackgroundColor(hexColor);
      viewer.render();
    }

    // -----------------------------------------------------------------
    // Measurement mode
    // -----------------------------------------------------------------
    function setMeasureMode(mode) {
      measureMode = mode;
      pickedAtoms = [];
      setStatus("Measurement mode: " + (mode || "off") +
                (mode ? " — click atoms to measure" : ""));
    }

    function handleAtomClick(atom) {
      if (!measureMode) return;
      pickedAtoms.push(atom);
      viewer.addSphere({center: {x: atom.x, y: atom.y, z: atom.z},
                        radius: 0.3, color: "yellow"});
      viewer.render();

      var needed = measureMode === "distance" ? 2 :
                   measureMode === "angle" ? 3 : 4;
      if (pickedAtoms.length === needed) {
        computeMeasurement();
      }
    }

    function computeMeasurement() {
      var result = null;
      if (measureMode === "distance" && pickedAtoms.length === 2) {
        var a = pickedAtoms[0], b = pickedAtoms[1];
        var d = Math.sqrt(
          Math.pow(a.x-b.x,2)+Math.pow(a.y-b.y,2)+Math.pow(a.z-b.z,2));
        result = d.toFixed(3) + " Å";
        // Draw dashed line
        viewer.addCylinder({
          start:{x:a.x,y:a.y,z:a.z}, end:{x:b.x,y:b.y,z:b.z},
          radius:0.05, color:"yellow", dashed:true, dashLength:0.2, gapLength:0.1
        });
        // Label at midpoint
        viewer.addLabel(result, {
          position:{x:(a.x+b.x)/2,y:(a.y+b.y)/2,z:(a.z+b.z)/2},
          fontColor:"yellow", fontSize:12, backgroundOpacity:0.7
        });
        setStatus("Distance: " + result);
      } else if (measureMode === "angle" && pickedAtoms.length === 3) {
        var a=pickedAtoms[0],b=pickedAtoms[1],c=pickedAtoms[2];
        var v1=[a.x-b.x,a.y-b.y,a.z-b.z];
        var v2=[c.x-b.x,c.y-b.y,c.z-b.z];
        var dot=v1[0]*v2[0]+v1[1]*v2[1]+v1[2]*v2[2];
        var n1=Math.sqrt(v1[0]*v1[0]+v1[1]*v1[1]+v1[2]*v1[2]);
        var n2=Math.sqrt(v2[0]*v2[0]+v2[1]*v2[1]+v2[2]*v2[2]);
        var ang=Math.acos(Math.max(-1,Math.min(1,dot/(n1*n2))))*180/Math.PI;
        result = ang.toFixed(2) + "°";
        viewer.addLabel(result, {
          position:{x:b.x,y:b.y,z:b.z},
          fontColor:"cyan", fontSize:12, backgroundOpacity:0.7
        });
        setStatus("Angle: " + result);
      } else if (measureMode === "dihedral" && pickedAtoms.length === 4) {
        var a=pickedAtoms[0],b=pickedAtoms[1],c=pickedAtoms[2],d=pickedAtoms[3];
        function sub(p,q){return[p.x-q.x,p.y-q.y,p.z-q.z];}
        function cross(u,v){return[u[1]*v[2]-u[2]*v[1],u[2]*v[0]-u[0]*v[2],u[0]*v[1]-u[1]*v[0]];}
        function dot2(u,v){return u[0]*v[0]+u[1]*v[1]+u[2]*v[2];}
        var b1=sub(b,a),b2=sub(c,b),b3=sub(d,c);
        var n1=cross(b1,b2),n2=cross(b2,b3),m=cross(n1,b2);
        var nb2=Math.sqrt(dot2(b2,b2));
        var b2h=[b2[0]/nb2,b2[1]/nb2,b2[2]/nb2];
        var x=dot2(n1,n2),y=dot2(m,n2);
        var di=Math.atan2(y,x)*180/Math.PI;
        result = di.toFixed(2) + "°";
        setStatus("Dihedral: " + result);
      }

      if (result) {
        measureResults.push({mode: measureMode, result: result, atoms: pickedAtoms.map(function(a){
          return {atom:a.atom, resn:a.resn, resi:a.resi, chain:a.chain};
        })});
        notifyPython("measurement", {type: measureMode, result: result});
      }

      pickedAtoms = [];
      viewer.render();
    }

    function clearMeasurements() {
      viewer.removeAllShapes();
      viewer.removeAllLabels();
      pickedAtoms = [];
      measureResults = [];
      viewer.render();
      // Re-apply annotations
      applyAnnotations(annotations);
    }

    // -----------------------------------------------------------------
    // Annotations
    // -----------------------------------------------------------------
    function applyAnnotations(anns) {
      annotations = anns || [];
      viewer.removeAllLabels();
      annotations.forEach(function(ann) {
        if (!ann.visible) return;
        if (ann.ann_type === "label") {
          viewer.addLabel(ann.label, {
            position:{x:ann.x,y:ann.y,z:ann.z},
            fontColor:ann.color, fontSize:ann.font_size,
            bold:ann.bold, backgroundOpacity:0.7
          });
        } else if (ann.ann_type === "distance" || ann.ann_type === "arrow") {
          viewer.addCylinder({
            start:{x:ann.x,y:ann.y,z:ann.z},
            end:{x:ann.x2,y:ann.y2,z:ann.z2},
            radius:0.05, color:ann.color, dashed:true
          });
          if (ann.label) {
            viewer.addLabel(ann.label, {
              position:{x:(ann.x+ann.x2)/2,y:(ann.y+ann.y2)/2,z:(ann.z+ann.z2)/2},
              fontColor:ann.color, fontSize:ann.font_size, backgroundOpacity:0.7
            });
          }
        }
      });
      viewer.render();
    }

    // -----------------------------------------------------------------
    // Export
    // -----------------------------------------------------------------
    function captureImage(width, height) {
      if (!viewer) return null;
      // Resize canvas temporarily for high-res export
      var canvas = document.querySelector("canvas");
      var origW = canvas.width, origH = canvas.height;
      if (width && height) {
        viewer.resize(width, height);
      }
      var dataUrl = viewer.pngURI();
      if (width && height) {
        viewer.resize(origW, origH);
      }
      return dataUrl;
    }

    function zoomTo(selection) {
      if (!viewer) return;
      viewer.zoomTo(selection || {});
      viewer.render();
    }

    function rotate(x, y, z) {
      if (!viewer) return;
      viewer.rotate(x, y, z);
      viewer.render();
    }

    function resetView() {
      if (!viewer) return;
      viewer.zoomTo({});
      viewer.render();
    }

    function spin(on) {
      if (!viewer) return;
      if (on) viewer.spin("y", 1);
      else viewer.spin(false);
    }

    // -----------------------------------------------------------------
    // Load 3Dmol.js dynamically
    // -----------------------------------------------------------------
    (function() {
      var script = document.createElement("script");
      // Try CDN first; the QWebEngineView allows network access
      script.src = "https://3dmol.csb.pitt.edu/build/3Dmol-min.js";
      script.crossOrigin = "anonymous";
      script.onload = function() { initViewer(); };
      script.onerror = function() {
        // Fallback: try unpkg
        var s2 = document.createElement("script");
        s2.src = "https://unpkg.com/3dmol@latest/build/3Dmol-min.js";
        s2.onload = function() { initViewer(); };
        s2.onerror = function() {
          document.getElementById("loading-overlay").textContent =
            "Failed to load 3Dmol.js. Please check your internet connection.";
        };
        document.head.appendChild(s2);
      };
      document.head.appendChild(script);
    })();
  </script>

</body>
</html>
